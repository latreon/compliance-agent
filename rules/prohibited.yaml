# EU AI Act Article 5 — prohibited AI practices.
# Keywords are matched (case-insensitive, on word boundaries) against file
# paths, imports, and code/config content to flag likely prohibited use.
# A match classifies the project as UNACCEPTABLE risk. Only specific multi-word
# phrases are used — a single match is severe, so bare terms that collide with
# ordinary code are intentionally excluded to avoid false alarms.
categories:
  - id: social-scoring
    name: "Social scoring of natural persons"
    article: "Art. 5(1)(c)"
    keywords:
      - social scoring
      - social credit score
      - citizen score
      - social credit system

  - id: subliminal-manipulation
    name: "Subliminal or manipulative techniques causing harm"
    article: "Art. 5(1)(a)"
    keywords:
      - subliminal manipulation
      - subliminal technique
      - manipulative technique

  - id: vulnerability-exploitation
    name: "Exploitation of vulnerabilities (age, disability, social/economic situation)"
    article: "Art. 5(1)(b)"
    keywords:
      - exploit vulnerabilities
      - exploit vulnerable groups
      - target vulnerable people
      - prey on vulnerable

  - id: emotion-recognition-restricted
    name: "Emotion recognition in the workplace or education"
    article: "Art. 5(1)(f)"
    keywords:
      - emotion recognition workplace
      - workplace emotion recognition
      - emotion recognition in the workplace
      - classroom emotion recognition

  - id: biometric-categorisation-sensitive
    name: "Biometric categorisation to infer sensitive attributes"
    article: "Art. 5(1)(g)"
    # Art. 5(1)(g) only bans biometric categorisation that *deduces or infers*
    # sensitive attributes (race, political opinions, trade-union membership,
    # religious/philosophical beliefs, sex life, sexual orientation). Bare
    # "biometric categorisation" is a *high-risk* practice (Annex III(1)), not a
    # prohibited one — it must not be listed here, or every lawful high-risk
    # categorisation system is wrongly told it "cannot be deployed".
    keywords:
      - infer sexual orientation
      - infer sexual_orientation
      - infer political opinion
      - infer political opinions
      - infer religious belief
      - infer religious beliefs
      - infer race from
      - categorise by ethnicity
      - categorize by ethnicity
      - categorise by race
      - categorize by race

  - id: predictive-policing-profiling
    name: "Predictive policing based solely on profiling"
    article: "Art. 5(1)(d)"
    # Art. 5(1)(d) only bans predicting the risk of a *natural person* committing
    # a crime based *solely* on profiling or personality traits. Place-based
    # predictive policing, and systems supporting human assessment on objective
    # facts, are *high-risk* (Annex III(6)), not prohibited. Bare "predictive
    # policing" therefore stays in annex3.yaml only — listing it here wrongly
    # brands lawful high-risk law-enforcement tools as un-deployable.
    keywords:
      - crime prediction profiling
      - predict criminal offence
      - predict criminal offense
      - predict who will commit
      - profiling to predict crime

  - id: untargeted-facial-scraping
    name: "Untargeted scraping of facial images"
    article: "Art. 5(1)(e)"
    keywords:
      - facial image scraping
      - untargeted facial scraping
      - scrape facial images

  - id: realtime-remote-biometric
    name: "Real-time remote biometric identification in public spaces"
    article: "Art. 5(1)(h)"
    keywords:
      - real-time remote biometric identification
      - realtime remote biometric identification
      - live facial recognition surveillance
