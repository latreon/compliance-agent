name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - name: Install WeasyPrint system libraries
        run: sudo apt-get update && sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest --cov=compliance_agent --cov-report=xml

      - name: Run linter
        run: uv run ruff check src/ tests/

      - name: Run formatter check
        run: uv run ruff format --check src/ tests/

      - name: Type check
        run: uv run mypy src

      - name: Self-scan (dogfood the sample project)
        # The sample is LIMITED-tier and intentionally carries HIGH gaps (it has
        # no disclosure/error-handling), so gate on CRITICAL here — --fail-on now
        # counts compliance gaps, not just findings.
        run: uv run compliance-agent scan examples/sample-chatbot --ci --fail-on critical

      - name: Self-scan SARIF output is valid with results
        run: |
          uv run compliance-agent scan examples/sample-chatbot --ci \
            --format sarif --output /tmp/self-scan.sarif
          python3 - <<'EOF'
          import json
          with open("/tmp/self-scan.sarif") as fh:
              log = json.load(fh)
          assert log["version"] == "2.1.0", log["version"]
          run = log["runs"][0]
          assert run["tool"]["driver"]["name"] == "ComplianceAgent"
          assert run["results"], "self-scan should produce SARIF results"
          print(f"SARIF OK: {len(run['results'])} result(s)")
          EOF

  action-test:
    # Dogfood the composite GitHub Action exactly as a consumer would use it.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run the local action
        id: compliance
        uses: ./
        with:
          path: examples/sample-chatbot
          fail-on: critical

      - name: Verify the action produced a SARIF report
        run: |
          test -s "${{ steps.compliance.outputs.report }}"
          python3 -c "import json,sys; json.load(open(sys.argv[1]))" \
            "${{ steps.compliance.outputs.report }}"
          echo "Action produced ${{ steps.compliance.outputs.report }}"

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build package
        run: uv build

      - name: Verify wheel contains templates and rules
        run: |
          unzip -l dist/*.whl | grep "compliance_agent/templates/" || exit 1
          unzip -l dist/*.whl | grep "compliance_agent/rules/" || exit 1
          echo "Templates and rules included in wheel"

      - name: Verify wheel contains the web dashboard assets
        run: |
          unzip -l dist/*.whl | grep "compliance_agent/web/app.py" || exit 1
          unzip -l dist/*.whl | grep "compliance_agent/web/static/dashboard.html" || exit 1
          unzip -l dist/*.whl | grep "compliance_agent/web/static/dashboard.js" || exit 1
          unzip -l dist/*.whl | grep "compliance_agent/web/static/dashboard.css" || exit 1
          echo "Dashboard assets included in wheel"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
