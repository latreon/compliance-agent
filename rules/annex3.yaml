# EU AI Act Annex III — high-risk AI system categories.
# Keywords are matched (case-insensitive, on word boundaries) against file
# paths, imports, and code/config content to infer the application domain.
# Guidance:
#   - Prefer specific multi-word phrases. Bare generic words that collide with
#     common directory/variable names (e.g. "migration", "risk_score") cause
#     false high-risk classifications and are intentionally avoided.
#   - A few domain-specific single tokens (e.g. "scada", "recidivism") are kept
#     where collision with ordinary code is negligible.
#   - Detection is a heuristic floor, not a verdict: keyword matching cannot see
#     a high-risk use expressed in ordinary business wording, so a non-match is
#     never assurance that a system is low-risk.
categories:
  - id: biometric
    name: "Biometric identification and categorisation of natural persons"
    article: "Annex III(1)"
    keywords:
      - biometric identification
      - biometric categorisation
      - biometric categorization
      - biometric data
      - face_recognition
      - facial recognition
      - fingerprint
      - iris_scan
      - voiceprint
      - gait recognition
      - emotion recognition
      - emotion detection
      - deepface
      - face_id

  - id: critical-infrastructure
    name: "Management and operation of critical infrastructure"
    article: "Annex III(2)"
    keywords:
      - critical infrastructure
      - power grid
      - electricity grid
      - scada
      - water supply
      - gas supply
      - traffic control
      - traffic management
      - utility management

  - id: education
    name: "Education and vocational training"
    article: "Annex III(3)"
    keywords:
      - student assessment
      - exam scoring
      - exam grading
      - essay scoring
      - essay grading
      - automated grading
      - grade student
      - student grading
      - admission decision
      - admissions decision
      - proctoring
      - plagiarism detection
      - vocational training
      - education assessment
      - learning outcome

  - id: employment
    name: "Employment, workers management and access to self-employment"
    article: "Annex III(4)"
    keywords:
      - recruitment
      - resume screening
      - resume parsing
      - cv screening
      - cv parsing
      - candidate ranking
      - candidate screening
      - candidate evaluation
      - candidate scoring
      - applicant ranking
      - applicant scoring
      - applicant tracking
      - hiring decision
      - job applicant
      - interview scoring
      - performance evaluation
      - employee monitoring
      - worker management
      - termination decision
      - promotion decision

  - id: essential-services
    name: "Access to essential private and public services and benefits"
    article: "Annex III(5)"
    keywords:
      - credit scoring
      - credit score
      - credit decision
      - credit risk
      - creditworthiness
      - loan approval
      - loan application
      - loan decision
      - lending decision
      - mortgage approval
      - insurance pricing
      - insurance underwriting
      - premium calculation
      - social benefits
      - welfare eligibility
      - benefit eligibility
      - emergency dispatch

  - id: law-enforcement
    name: "Law enforcement"
    article: "Annex III(6)"
    keywords:
      - law enforcement
      - predictive policing
      - crime prediction
      - crime forecasting
      - recidivism
      - polygraph
      - evidence analysis
      - criminal suspect

  - id: migration
    name: "Migration, asylum and border control management"
    article: "Annex III(7)"
    keywords:
      - visa application
      - asylum
      - border control
      - immigration
      - travel document verification

  - id: justice
    name: "Administration of justice and democratic processes"
    article: "Annex III(8)"
    keywords:
      - judicial decision
      - court decision
      - sentencing
      - legal ruling
      - election management
      - voting system
      - democratic process
